{% extends "ledger/base.html" %}

{% block title %}Set New Password{% endblock %}
{% block page_heading %}Set New Password{% endblock %}

{% block content %}
  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Change password</button>
    </form>
  {% else %}
    <p>Invalid password reset link.</p>
  {% endif %}
{% endblock %}
