<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Recipe Book{% endblock %}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      .site-header {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
      }
      .site-header h1 {
        margin: 0;
      }
      .site-header a {
        color: inherit;
        text-decoration: none;
      }
      .auth-actions form {
        margin: 0;
      }
      .page-heading {
        margin-top: 0;
      }
      ul {
        padding-left: 1.25rem;
      }
      img {
        display: block;
        height: auto;
        max-width: 100%;
      }
      form p {
        margin-bottom: 0.75rem;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <h1><a href="{% url 'recipes_list' %}">Recipe Book</a></h1>
      <div class="auth-actions">
        {% if user.is_authenticated %}
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}">Login</a>
        {% endif %}
      </div>
    </header>

    <h2 class="page-heading">{% block page_heading %}Recipe Book{% endblock %}</h2>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
