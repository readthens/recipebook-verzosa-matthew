<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Recipe Book{% endblock %}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      header h1 {
        margin: 0 0 1rem;
      }
      header a {
        color: inherit;
        text-decoration: none;
      }
      ul {
        padding-left: 1.25rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><a href="{% url 'recipes_list' %}">Recipe Book</a></h1>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
