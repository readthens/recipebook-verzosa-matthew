{% extends "ledger/base.html" %}

{% block title %}Recipe List{% endblock %}
{% block page_heading %}Recipe List{% endblock %}

{% block content %}
  <ul>
    {% for recipe in recipes %}
      <li><a href="{% url 'recipe_detail' recipe.pk %}">{{ recipe.name }}</a></li>
    {% empty %}
      <li>No recipes yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
